  <circle cx="135" cy="98" r="130" fill="#C7F9CC" opacity="0.46"/>
  <circle cx="1076" cy="526" r="166" fill="#DDE7FF" opacity="0.72"/>
  <path d="M78 501C180 444 282 429 392 456C512 486 604 550 742 526C850 508 921 444 1035 459" stroke="#D6E0EA" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 14"/>

  <path d="M454 315H746" stroke="url(#connector)" stroke-width="18" stroke-linecap="round"/>
  <path d="M492 315H708" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-dasharray="2 22" opacity="0.8"/>

