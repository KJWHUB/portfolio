    <rect x="744" y="184" width="256" height="256" rx="36" fill="#EFF4FF"/>
    <circle cx="872" cy="312" r="88" fill="url(#r2dbcTile)"/>
    <ellipse cx="872" cy="272" rx="54" ry="21" fill="#FFFFFF"/>
    <path d="M818 272V343C818 355 842 365 872 365C902 365 926 355 926 343V272" fill="#DDE6FF"/>
