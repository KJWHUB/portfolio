    <path d="M390 338C393 288 359 243 309 235" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.45"/>
    <text x="328" y="492" fill="#14532D" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="800" text-anchor="middle">Spring WebFlux</text>
  </g>

