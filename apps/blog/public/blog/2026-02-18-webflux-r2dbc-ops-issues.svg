    <path d="M821 308C831 319 851 325 872 325C893 325 913 319 923 308" stroke="#1D2B68" stroke-width="7" stroke-linecap="round" opacity="0.35"/>
    <path d="M831 236H875L911 272" stroke="#AFC0FF" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="831" cy="236" r="9" fill="#AFC0FF"/>
