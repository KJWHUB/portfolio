<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Spring WebFlux plus R2DBC operations issues</title>
  <desc id="desc">A blog cover with Spring WebFlux and R2DBC style icons connected by a plus sign, with small markers for production issues.</desc>
  <defs>
    <linearGradient id="background" x1="90" y1="40" x2="1110" y2="590" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6FAF5"/>
      <stop offset="0.48" stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <linearGradient id="springTile" x1="260" y1="160" x2="428" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7ED957"/>
      <stop offset="1" stop-color="#28A745"/>
    </linearGradient>
    <linearGradient id="r2dbcTile" x1="774" y1="156" x2="948" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2D3C82"/>
      <stop offset="1" stop-color="#111A4E"/>
    </linearGradient>
    <linearGradient id="connector" x1="452" y1="315" x2="748" y2="315" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22C55E"/>
      <stop offset="0.5" stop-color="#64748B"/>
      <stop offset="1" stop-color="#273574"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.16"/>
    </filter>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" stroke="#D8E2EA" stroke-width="1" opacity="0.5"/>
    </pattern>
  </defs>

